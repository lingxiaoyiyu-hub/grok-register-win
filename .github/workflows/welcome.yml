name: Welcome New Contributor

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Welcome for PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `👋 感谢你提交 Pull Request！欢迎成为 Grok Register Win 的贡献者。

            我们会尽快审阅。请确保：
            - ✅ 已阅读 [贡献指南](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)
            - ✅ PR 描述完整
            - ✅ 代码符合 PEP 8 规范

            感谢你的支持！💖`
            });

      - name: Welcome for Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.payload.issue.user.login,
              state: 'all'
            });
            if (issues.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `👋 欢迎你首次在 Grok Register Win 提 Issue！

            感谢你的反馈。我们会尽快查看并回复。

            💬 也可以在 [Discussions](https://github.com/${{ github.repository }}/discussions) 参与讨论

            感谢你的支持！💖`
              });
            }
